name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django-version: ["5.2"]
        experimental: [false]
        include:
          # Django 6.0 (pre-release) — allow failures
          - python-version: "3.12"
            django-version: "6.0"
            experimental: true
          - python-version: "3.13"
            django-version: "6.0"
            experimental: true
          # Python 3.14 (pre-release) — allow failures
          - python-version: "3.14"
            django-version: "5.2"
            experimental: true
          - python-version: "3.14"
            django-version: "6.0"
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install "Django~=${{ matrix.django-version }}"

      - name: Run tests
        run: pytest --cov=django_suap_auth --cov-report=xml --cov-fail-under=95

      - name: Upload coverage to Codecov
        if: ${{ !matrix.experimental }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python${{ matrix.python-version }}-django${{ matrix.django-version }}
          fail_ci_if_error: false

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/django
            p/security-audit
