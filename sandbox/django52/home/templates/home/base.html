<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sandbox — django-suap-auth{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">🐦 django-suap-auth sandbox</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
          <span class="text-light small">{{ user.get_full_name|default:user.username }}</span>
          <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
          <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
          </form>
        {% else %}
          <a href="{% url 'suap_auth:login' %}" class="btn btn-outline-light btn-sm">Entrar</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container py-5">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
